

services:
  # ── PostgreSQL 16 ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: matsetu_postgres
    environment:
      POSTGRES_DB: matsetu
      POSTGRES_USER: matsetu
      POSTGRES_PASSWORD: matsetu_secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matsetu"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: matsetu_redis
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  # ── Qdrant ──────────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: matsetu_qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    restart: unless-stopped

  # ── MinIO (S3-compatible) ───────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: matsetu_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/Dockerfile
    container_name: matsetu_api
    environment:
      DATABASE_URL: postgresql+asyncpg://matsetu:matsetu_secure_password@postgres:5432/matsetu
      DATABASE_URL_SYNC: postgresql://matsetu:matsetu_secure_password@postgres:5432/matsetu
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      MINIO_ENDPOINT: minio:9000
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./backend:/app/backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 4

  # ── Celery Worker ───────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: infra/Dockerfile
    container_name: matsetu_celery
    command: celery -A backend.tasks.send_otp.celery_app worker --loglevel=info --concurrency=8 -Q otp,receipts
    environment:
      DATABASE_URL_SYNC: postgresql://matsetu:matsetu_secure_password@postgres:5432/matsetu
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  # ── Celery Beat (periodic tasks) ────────────────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: infra/Dockerfile
    container_name: matsetu_celery_beat
    command: celery -A backend.tasks.send_otp.celery_app beat --loglevel=info
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      - redis
    restart: unless-stopped

  # ── NGINX Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: matsetu_nginx
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "8080:80"
      - "8443:443"
    restart: unless-stopped

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: matsetu_prometheus
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: matsetu_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: matsetu_grafana
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  prometheus_data:
  grafana_data:
