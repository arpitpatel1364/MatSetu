worker_processes auto;
events { worker_connections 4096; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=200r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=vote:10m rate=50r/s;

    # Upstream FastAPI
    upstream api_backend {
        server host.docker.internal:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # API proxy
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Auth endpoints — stricter rate limit
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Vote endpoint — very strict
        location /api/v1/vote/cast {
            limit_req zone=vote burst=2 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # SSE — disable buffering
        location /api/v1/sse/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            add_header X-Accel-Buffering no;
        }

        # Frontend — Booth
        location /booth/ {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /booth/index.html;
        }

        # Frontend — Admin
        location /admin/ {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /admin/index.html;
        }

        # Frontend — Receipt verification (public)
        location /verify {
            root /usr/share/nginx/html/receipt;
            try_files $uri /index.html;
        }

        # Health check
        location /health {
            proxy_pass http://api_backend;
        }

        # Default
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
    }
}
