global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'matsetu-production'

# Alertmanager config (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

scrape_configs:
  # FastAPI application metrics
  - job_name: 'matsetu-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics
    scrape_interval: 10s

  # PostgreSQL metrics (requires postgres_exporter)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']

  # Redis metrics (requires redis_exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']

  # Node/system metrics
  - job_name: 'node'
    static_configs:
      - targets: ['node_exporter:9100']

  # Nginx metrics
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx_exporter:9113']

# Recording rules for MatSetu-specific metrics
rule_files:
  - "matsetu_rules.yml"
