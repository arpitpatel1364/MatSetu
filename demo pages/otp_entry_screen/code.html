<body class="bg-[#F8FAFC] font-sans text-on-surface antialiased min-h-screen flex flex-col">
<!-- Top Navigation Anchor -->
<nav class="w-full h-16 sticky top-0 border-b-2 border-slate-100 bg-white dark:bg-slate-900 flex justify-between items-center px-8 z-50">
<div class="flex items-center gap-4">
<span class="text-lg font-extrabold text-[#1B3A6B] dark:text-blue-400 font-['Public_Sans'] uppercase tracking-tight">MatSetu Voter Interface</span>
</div>
<div class="flex items-center gap-6">
<button class="text-slate-500 hover:text-slate-800 transition-all font-bold uppercase tracking-tight text-sm">Change Language</button>
<div class="flex gap-2">
<span class="material-symbols-outlined p-2 hover:bg-slate-50 rounded-md cursor-pointer" data-icon="help">help</span>
<span class="material-symbols-outlined p-2 hover:bg-slate-50 rounded-md cursor-pointer" data-icon="refresh">refresh</span>
</div>
</div>

<main class="flex-grow flex items-center justify-center p-gutter">
<!-- Verification Card -->
<div class="w-full max-w-[560px] bg-white border border-slate-200 rounded-xl p-stack-lg flex flex-col items-center text-center">
<!-- Success Status Header -->
<div class="flex flex-col items-center mb-stack-lg">
<div class="w-16 h-16 bg-[#DCFCE7] rounded-full flex items-center justify-center mb-base">
<span class="material-symbols-outlined text-[#15803D] !text-4xl" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h2 class="text-[#15803D] font-bold text-h3 uppercase tracking-wider">Identity Verified</h2>
</div>
<!-- Content Area -->
<div class="w-full space-y-base mb-stack-lg">
<h1 class="font-h2 text-primary leading-tight">Ramesh Kumar Patel</h1>
<p class="text-body-base text-on-surface-variant max-w-[400px] mx-auto">
                    Please enter the 6-digit OTP sent to your registered mobile number <span class="font-semibold text-on-surface">••••7823</span>
</p>
</div>
<!-- OTP Input Field Grid -->
<div class="flex gap-stack-md mb-stack-lg">
<input class="otp-input w-[56px] h-[64px] border border-slate-200 rounded-lg text-center text-h2 font-bold text-primary-container" maxlength="1" placeholder="•" type="text"/>
<input class="otp-input w-[56px] h-[64px] border border-slate-200 rounded-lg text-center text-h2 font-bold text-primary-container" maxlength="1" placeholder="•" type="text"/>
<input class="otp-input w-[56px] h-[64px] border border-slate-200 rounded-lg text-center text-h2 font-bold text-primary-container" maxlength="1" placeholder="•" type="text"/>
<input class="otp-input w-[56px] h-[64px] border border-slate-200 rounded-lg text-center text-h2 font-bold text-primary-container" maxlength="1" placeholder="•" type="text"/>
<input class="otp-input w-[56px] h-[64px] border border-slate-200 rounded-lg text-center text-h2 font-bold text-primary-container" maxlength="1" placeholder="•" type="text"/>
<input class="otp-input w-[56px] h-[64px] border border-slate-200 rounded-lg text-center text-h2 font-bold text-primary-container" maxlength="1" placeholder="•" type="text"/>
</div>
<!-- Expiry Feedback -->
<div class="flex items-center gap-3 mb-stack-lg bg-surface-container-low px-stack-md py-2 rounded-full border border-outline-variant">
<div class="relative w-5 h-5">
<svg class="w-full h-full -rotate-90" viewbox="0 0 20 20">
<circle class="text-outline-variant" cx="10" cy="10" fill="transparent" r="8" stroke="currentColor" stroke-width="2"></circle>
<circle class="text-secondary" cx="10" cy="10" fill="transparent" r="8" stroke="currentColor" stroke-dasharray="50" stroke-linecap="round" stroke-width="2"></circle>
</svg>
</div>
<span class="text-label-bold text-on-surface-variant uppercase tracking-widest">OTP expires in <span class="text-secondary font-bold">04:32</span></span>
</div>
<!-- Actions -->
<div class="w-full space-y-stack-md">
<button class="w-full h-[56px] bg-[#2563EB] text-white font-button rounded-lg text-lg uppercase tracking-widest hover:bg-[#1B3A6B] transition-colors active:scale-95">
                    Verify OTP
                </button>
<div class="flex flex-col items-center gap-base">
<button class="text-secondary font-label-bold hover:underline py-2">
                        Resend OTP
                    </button>
<div class="flex items-center gap-2 text-error px-4 py-1.5 bg-error-container rounded-full border border-error/10">
<span class="material-symbols-outlined !text-[16px]" data-icon="warning">warning</span>
<span class="text-[11px] font-bold uppercase tracking-tighter">Maximum 3 attempts allowed</span>
</div>
</div>
